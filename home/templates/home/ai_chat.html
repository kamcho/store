<!-- AI Chat Widget - Modern Design -->
<div id="ai-chat-widget" class="ai-chat-widget">
    <!-- Chat Window -->
    <div id="ai-chat-window" class="ai-chat-window hidden">
        <!-- Header -->
        <div class="ai-chat-header">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                    <i class="fas fa-robot text-white text-lg"></i>
                </div>
                <div>
                    <h3 class="text-white font-bold text-sm">Samsung AI Assistant</h3>
                    <p class="text-gray-300 text-xs">Online</p>
                </div>
            </div>
            <button id="ai-chat-close" class="text-white hover:text-gray-300 transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <!-- Messages Container -->
        <div id="ai-chat-messages" class="ai-chat-messages">
            <div class="ai-message">
                <div class="message-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-bubble ai-bubble">
                    Hello! I'm your Samsung AI assistant. Ask me anything about our products!
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="ai-typing-indicator" class="ai-typing-indicator hidden">
            <div class="message-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="ai-chat-input">
            <input type="text" id="ai-chat-input-field" placeholder="Ask about Samsung products..." />
            <button id="ai-chat-send" class="send-button">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Floating Button -->
    <button id="ai-chat-toggle" class="ai-chat-fab">
        <i class="fas fa-robot"></i>
    </button>
</div>

<style>
    .ai-chat-widget {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        font-family: 'Poppins', sans-serif;
    }

    .ai-chat-window {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 400px;
        height: 600px;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        transform-origin: bottom right;
    }

    .ai-chat-window.hidden {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
        pointer-events: none;
    }

    .ai-chat-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ai-chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: #0f0f1e;
    }

    .ai-chat-messages::-webkit-scrollbar {
        width: 6px;
    }

    .ai-chat-messages::-webkit-scrollbar-track {
        background: transparent;
    }

    .ai-chat-messages::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
    }

    .ai-message,
    .user-message {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        animation: slideIn 0.3s ease;
    }

    .user-message {
        flex-direction: row-reverse;
    }

    .message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 14px;
        flex-shrink: 0;
    }

    .user-message .message-avatar {
        background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
    }

    .message-bubble {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
        word-wrap: break-word;
    }

    .ai-bubble {
        background: rgba(255, 255, 255, 0.1);
        color: #e5e7eb;
        border-bottom-left-radius: 4px;
    }

    .user-bubble {
        background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
        color: white;
        border-bottom-right-radius: 4px;
    }

    .ai-typing-indicator {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 0 20px 16px;
        background: #0f0f1e;
    }

    .ai-typing-indicator.hidden {
        display: none;
    }

    .typing-dots {
        background: rgba(255, 255, 255, 0.1);
        padding: 12px 16px;
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        display: flex;
        gap: 4px;
    }

    .typing-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #667eea;
        animation: typing 1.4s infinite;
    }

    .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
    }

    .ai-chat-input {
        padding: 20px;
        background: #1a1a2e;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        gap: 12px;
    }

    #ai-chat-input-field {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 12px 16px;
        color: white;
        font-size: 14px;
        outline: none;
        transition: all 0.3s ease;
    }

    #ai-chat-input-field:focus {
        border-color: #667eea;
        background: rgba(255, 255, 255, 0.08);
    }

    #ai-chat-input-field::placeholder {
        color: rgba(255, 255, 255, 0.4);
    }

    .send-button {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .send-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .send-button:active {
        transform: translateY(0);
    }

    .ai-chat-fab {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .ai-chat-fab:hover {
        transform: scale(1.1);
        box-shadow: 0 12px 32px rgba(102, 126, 234, 0.5);
    }

    .ai-chat-fab:active {
        transform: scale(0.95);
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes typing {

        0%,
        60%,
        100% {
            opacity: 0.3;
            transform: scale(0.8);
        }

        30% {
            opacity: 1;
            transform: scale(1);
        }
    }

    @media (max-width: 768px) {
        .ai-chat-window {
            width: 100vw;
            height: 100vh;
            bottom: 0;
            right: 0;
            border-radius: 0;
            z-index: 10000;
        }

        .ai-chat-window.hidden {
            transform: translateY(100%);
            opacity: 1; /* Keep it ready for slide up */
        }

        .ai-chat-widget {
            bottom: 20px;
            right: 20px;
        }

        .ai-chat-header {
            padding: 15px;
            padding-top: max(15px, env(safe-area-inset-top));
        }

        .ai-chat-input {
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        #ai-chat-close {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const chatToggle = document.getElementById('ai-chat-toggle');
        const chatWindow = document.getElementById('ai-chat-window');
        const chatClose = document.getElementById('ai-chat-close');
        const chatInput = document.getElementById('ai-chat-input-field');
        const chatSend = document.getElementById('ai-chat-send');
        const messagesContainer = document.getElementById('ai-chat-messages');
        const typingIndicator = document.getElementById('ai-typing-indicator');

        // Toggle chat window
        chatToggle.addEventListener('click', () => {
            chatWindow.classList.toggle('hidden');
            if (!chatWindow.classList.contains('hidden')) {
                chatInput.focus();
            }
        });

        chatClose.addEventListener('click', () => {
            chatWindow.classList.add('hidden');
        });

        // Send message
        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            chatInput.value = '';

            // Show typing indicator
            typingIndicator.classList.remove('hidden');

            // Send to backend
            const contextElement = document.getElementById('product-chat-context');
            const productId = contextElement ? contextElement.dataset.productId : null;

            fetch('/api/chat/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken()
                },
                body: JSON.stringify({
                    message: message,
                    product_id: productId
                })
            })
                .then(response => response.json())
                .then(data => {
                    typingIndicator.classList.add('hidden');
                    addMessage(data.response, 'ai');
                })
                .catch(error => {
                    typingIndicator.classList.add('hidden');
                    addMessage('Sorry, I encountered an error. Please try again.', 'ai');
                    console.error('Error:', error);
                });
        }

        chatSend.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Add message to chat
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = sender === 'user' ? 'user-message' : 'ai-message';

            messageDiv.innerHTML = `
            <div class="message-avatar">
                <i class="fas fa-${sender === 'user' ? 'user' : 'robot'}"></i>
            </div>
            <div class="message-bubble ${sender === 'user' ? 'user-bubble' : 'ai-bubble'}">
                ${text}
            </div>
        `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }


        // Get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Get CSRF token from DOM or cookie
        function getCSRFToken() {
            // Try to get from cookie first
            let token = getCookie('csrftoken');
            if (token) return token;

            // Fallback: try to get from hidden input or meta tag
            const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
            if (csrfInput) return csrfInput.value;

            const csrfMeta = document.querySelector('meta[name="csrf-token"]');
            if (csrfMeta) return csrfMeta.content;

            return '';
        }
    });
</script>
